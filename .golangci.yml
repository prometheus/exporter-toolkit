formatters:
  enable:
    - goimports
linters:
  enable:
    - misspell
    - modernize
    - revive
    # Correctness linters (low-noise, no findings on the current tree).
    - copyloopvar
    - durationcheck
    - gocritic
    - makezero
    - unconvert
    - wastedassign
  exclusions:
    generated: strict
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test.go
    warn-unused: true
  settings:
    errcheck:
      exclude-functions:
        # Used in HTTP handlers, any error is handled by the server itself.
        - (net/http.ResponseWriter).Write
    govet:
      enable-all: true
      disable:
        # Struct field ordering is not worth the churn/readability cost.
        - fieldalignment
        # err shadowing is idiomatic and used throughout the codebase.
        - shadow
    revive:
      rules:
        # https://github.com/mgechev/revive/blob/master/RULES_DESCRIPTIONS.md#unused-parameter
        - name: unused-parameter
          severity: warning
          disabled: true
    staticcheck:
      checks:
        - all
        - -ST1005 # FIXME: Incorrectly formatted error string
version: "2"
